    // ============================================================

    function formatDDMM(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[2]}-${parts[1]}`;
        }
        return dateStr;
    }

    // ============================================================
    // FUNGSI GENERATE MONTH HEADER
    // ============================================================
    function generateMonthHeaders(startDate, endDate, totalDays) {
        const start = new Date(startDate);
        const end = new Date(endDate);
        const months = [];
        
        let currentMonth = new Date(start.getFullYear(), start.getMonth(), 1);
        let lastMonth = new Date(end.getFullYear(), end.getMonth(), 1);
        
        while (currentMonth <= lastMonth) {
            const monthStart = new Date(currentMonth);
            const monthEnd = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
            
            let leftPos = 0;
            let width = 0;
            
            if (monthEnd >= start && monthStart <= end) {
                const actualStart = monthStart < start ? start : monthStart;
                const actualEnd = monthEnd > end ? end : monthEnd;
                
                const startOffset = (actualStart - start) / (1000 * 3600 * 24);
                const duration = (actualEnd - actualStart) / (1000 * 3600 * 24) + 1;
                
                leftPos = (startOffset / totalDays) * 100;
                width = (duration / totalDays) * 100;
            }
            
            const monthName = monthNames[currentMonth.getMonth()];
            const yearShort = currentMonth.getFullYear().toString().slice(-2);
            
            months.push({
                name: `${monthName} ${yearShort}`,
                left: leftPos,
                width: width
            });
            
            currentMonth.setMonth(currentMonth.getMonth() + 1);
        }
        
        return months;
    }

    // ============================================================
    // FUNGSI FORMAT TANGGAL (TANPA TIME)
    // ============================================================
    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getTodayDate() {
        return formatDate(new Date());
    }

    function getFutureDate(days) {
        const date = new Date();
        date.setDate(date.getDate() + days);
        return formatDate(date);
    }

    // ============================================================

    function saveToHistory() {
        const currentSnapshot = JSON.parse(JSON.stringify(projectData));
        if (currentStateIndex < historyStack.length - 1) {
            historyStack = historyStack.slice(0, currentStateIndex + 1);
        }
        historyStack.push(currentSnapshot);
        if (historyStack.length > maxHistory) {
            historyStack.shift();
        } else {
            currentStateIndex = historyStack.length - 1;
        }
        updateUndoButtonState();
        saveHistoryToLocal();
    }

    function undo() {
        if (!isEditMode) {
            showToast("⚠️ Mode Read Only! Aktifkan Edit Mode untuk undo.", "#e74c3c");
            return;
        }
        if (currentStateIndex > 0) {
            currentStateIndex--;
            projectData = JSON.parse(JSON.stringify(historyStack[currentStateIndex]));
            saveDataToLocal();
            cancelEdit();
            renderAll();
            showToast("↩️ Undo berhasil!", "#d69e2e");
        } else {
            showToast("⚠️ Tidak ada langkah yang bisa di-undo", "#e74c3c");
        }
        updateUndoButtonState();
    }

    function updateUndoButtonState() {
        const undoBtn = document.getElementById('undoBtn');

                undoBtn.style.cursor = "not-allowed";
            } else {

        } else {

            currentStateIndex = 0;

    // ============================================================
    // KONEKSI KE GOOGLE SHEETS
    // ============================================================
    async function syncAllToGoogleSheets() {
        if (!isEditMode) {
            showToast("⚠️ Mode Read Only! Aktifkan Edit Mode terlebih dahulu.", "#e74c3c");
            return;
        }
        try {
            document.getElementById('syncStatus').innerHTML = "🔄 Menyimpan...";
            document.getElementById('syncStatus').style.color = "#f39c12";
            
            const dataToSend = projectData.map(item => ({
                NO: item.no,
                KEGIATAN: item.kegiatan,
                JADWAL: item.jadwal,
                STATUS: item.status,
                PIC: item.pic,
                "START DATE": item.startDate,
                "END DATE": item.endDate,
                KENDALA: item.kendala,
                "TINDAK LANJUT": item.tindakLanjut,
                KETERANGAN: item.keterangan
            }));
            
            await fetch(GOOGLE_SHEETS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "write", data: dataToSend })
            });
            
            document.getElementById('syncStatus').innerHTML = "✅ Tersimpan!";
            document.getElementById('syncStatus').style.color = "#38a169";
            showToast("✅ Data tersimpan ke cloud!", "#2ecc71");
            
            setTimeout(() => {
                document.getElementById('syncStatus').innerHTML = "";
            }, 3000);
            
        } catch(e) {
            console.error("Sync error:", e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Gagal sync";
            document.getElementById('syncStatus').style.color = "#e74c3c";
            showToast("⚠️ Gagal sync ke cloud", "#e74c3c");
        }
    }

    async function loadAllFromGoogleSheets() {
        try {
            document.getElementById('syncStatus').innerHTML = "🔄 Memuat...";
            document.getElementById('syncStatus').style.color = "#f39c12";
            
            const response = await fetch(`${GOOGLE_SHEETS_URL}?action=read`, {
                method: "GET",
                headers: { "Accept": "application/json" }
            });
            
            const result = await response.json();
            
            if (result.success && result.data && result.data.length > 0) {
                projectData = result.data.map(row => ({
                    no: row.NO || "",
                    kegiatan: row.KEGIATAN || "",
                    jadwal: row.JADWAL || "",
                    status: row.STATUS || "✖",
                    pic: row.PIC || "",
                    startDate: row["START DATE"] || "",
                    endDate: row["END DATE"] || "",
                    kendala: row.KENDALA || "",
                    tindakLanjut: row["TINDAK LANJUT"] || "",
                    keterangan: row.KETERANGAN || ""
                }));
                
                saveDataToLocal();
                renderAll();
                document.getElementById('syncStatus').innerHTML = `✅ ${projectData.length} data`;
                document.getElementById('syncStatus').style.color = "#38a169";
                showToast(`✅ Load ${projectData.length} data dari cloud!`, "#2ecc71");
                
                setTimeout(() => {
                    document.getElementById('syncStatus').innerHTML = "";
                }, 3000);
            } else {
                document.getElementById('syncStatus').innerHTML = "⚠️ No data";
                showToast("⚠️ Tidak ada data di cloud", "#f39c12");
            }
            
        } catch(e) {
            console.error("Load error:", e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Gagal load";
            showToast("⚠️ Gagal load dari cloud, pakai data lokal", "#e74c3c");
        }
    }

    // ============================================================
    // EXPORT / IMPORT
    // ============================================================
    function exportToCSV(){
        const headers = ["No","Kegiatan","Jadwal","Status","PIC","Start Date","End Date","Kendala","Tindak Lanjut","Keterangan"];
        const rows = projectData.map(d=>[d.no,d.kegiatan,d.jadwal,d.status,d.pic,d.startDate,d.endDate,d.kendala,d.tindakLanjut,d.keterangan]);
        const csvContent = [headers, ...rows].map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
        const blob=new Blob(["\uFEFF"+csvContent],{type:"text/csv;charset=utf-8;"});
        const link=document.createElement("a");
        link.href=URL.createObjectURL(blob);
        link.download=`ssr_data_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast("📄 Export CSV berhasil");
    }

    function exportToExcel(){
        const sheetData = [["No","Kegiatan","Jadwal","Status","PIC","Start Date","End Date","Kendala","Tindak Lanjut","Keterangan"],
            ...projectData.map(d=>[d.no,d.kegiatan,d.jadwal,d.status,d.pic,d.startDate,d.endDate,d.kendala,d.tindakLanjut,d.keterangan])];
        const ws = XLSX.utils.aoa_to_sheet(sheetData);
        ws['!cols'] = [{wch:8},{wch:40},{wch:20},{wch:10},{wch:20},{wch:12},{wch:12},{wch:30},{wch:30},{wch:30}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "SSR_M_KITE");
        XLSX.writeFile(wb, `ssr_project_${new Date().toISOString().slice(0,19)}.xlsx`);
        showToast("📊 Export Excel berhasil");
    }

        if (!isEditMode) {
            showPasswordModal('import');
            event.target.value = '';
            return;
        }
        const file = event.target.files[0];
        if(!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();
        reader.onload = function(e){
            let data = [];
            if(ext === 'csv'){
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
                for(let i=1;i<lines.length;i++){
                    if(!lines[i].trim()) continue;
                    const values = lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g).map(v=>v.replace(/^"|"$/g,''));
                    if(values.length>=headers.length){
                        let obj={};
                        headers.forEach((h,idx)=>obj[h]=values[idx]||"");
                        data.push(obj);
                    }
                }
            } else {
                const workbook = XLSX.read(e.target.result, {type:'binary'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                data = XLSX.utils.sheet_to_json(sheet);
            }
            if(data.length===0) { alert("Tidak ada data yang terbaca"); return; }
            const newData = data.map(row=>({
                no: row.No || row.no || "",
                kegiatan: row.Kegiatan || row.kegiatan || "",
                jadwal: row.Jadwal || row.jadwal || "",
                status: row.Status || row.status || "✖",
                pic: row.PIC || row.pic || "",
                startDate: row["Start Date"] || row.startDate || row["Start"] || "",
                endDate: row["End Date"] || row.endDate || row["End"] || "",
                kendala: row.Kendala || row.kendala || "",
                tindakLanjut: row["Tindak Lanjut"] || row.tindakLanjut || "",
                keterangan: row.Keterangan || row.keterangan || ""
            }));
            if(newData.length>0){
                projectData = newData;
                recordChangeAndSave("Import data");
                cancelEdit();
                renderAll();
                syncAllToGoogleSheets();
                alert(`Import berhasil! ${newData.length} kegiatan dimuat.`);
            } else alert("Format tidak cocok");
        };
        if(ext === 'csv') reader.readAsText(file, 'UTF-8');
        else reader.readAsBinaryString(file);
        event.target.value='';
    }

    function exportToJSON(){
        const dataStr=JSON.stringify(projectData,null,2);
        const blob=new Blob([dataStr],{type:"application/json"});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`ssr_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast("💾 Backup JSON berhasil");
    }

    function showToast(message, bgColor = "#2c5282") {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.backgroundColor = bgColor;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ============================================================
    // RENDER ALL
    // ============================================================
    function renderAll(){
        let filtered = [...projectData];
        if (searchQuery) {
            filtered = filtered.filter(d => 
                d.kegiatan.toLowerCase().includes(searchQuery) || 
                (d.pic && d.pic.toLowerCase().includes(searchQuery)) ||
                (d.no && d.no.toLowerCase().includes(searchQuery)) ||
                (d.keterangan && d.keterangan.toLowerCase().includes(searchQuery))
            );
        }
        
        const enriched = filtered.map(d=>({...d, overdue: isOverdue(d.status, d.endDate)}));
        const total=enriched.length, selesai=enriched.filter(d=>d.status==="✔").length, belum=enriched.filter(d=>d.status==="✖").length, proses=enriched.filter(d=>d.status==="⏳").length, overdueCount=enriched.filter(d=>d.overdue).length;
        document.getElementById("statsCards").innerHTML=`<div class="card total"><h3>📋 Total</h3><div class="number">${total}</div></div><div class="card selesai"><h3>✅ Selesai</h3><div class="number">${selesai}</div></div><div class="card belum"><h3>❌ Belum</h3><div class="number">${belum}</div></div><div class="card proses"><h3>⏳ Proses</h3><div class="number">${proses}</div></div><div class="card overdue"><h3>⚠️ Overdue</h3><div class="number">${overdueCount}</div></div>`;
        
        const ctx=document.getElementById('statusChart').getContext('2d');
        if(window.statusChartInstance) window.statusChartInstance.destroy();
        window.statusChartInstance=new Chart(ctx,{type:'doughnut',data:{labels:['Selesai','Belum','Proses'],datasets:[{data:[selesai,belum,proses],backgroundColor:['#38a169','#e53e3e','#ed8936'],borderWidth:0}]}});
        
        const picMap=new Map();
        enriched.forEach(d=>{let p=d.pic||"Tanpa PIC"; if(!picMap.has(p)) picMap.set(p,{total:0,selesai:0,overdue:0}); let rec=picMap.get(p); rec.total++; if(d.status==="✔") rec.selesai++; if(d.overdue) rec.overdue++;});
        const picBody=document.querySelector("#picTable tbody"); picBody.innerHTML="";
        for(let [pic,data] of picMap.entries()){
            let percent=data.total===0?0:(data.selesai/data.total*100);
            picBody.innerHTML+=`<tr>
                <td>${pic}</td>
                <td>${data.total}</td>
                <td>${data.selesai}</td>
                <td>${data.overdue}</td>
                <td><div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%"></div></div> ${Math.round(percent)}%</div></td>
            </tr>`;
        }
        
        const tbody=document.getElementById("tableBody"); tbody.innerHTML="";
        enriched.forEach((d,idx)=>{
            const originalIdx = projectData.findIndex(orig => orig === d);
            const statusClass = d.status === "✔" ? "status-selesai" : (d.status === "⏳" ? "status-proses" : "status-belum");
            const statusText = d.status === "✔" ? "Selesai" : (d.status === "⏳" ? "Proses" : "Belum");
            tbody.innerHTML+=`<tr class="${d.overdue?'overdue-row':''}" onclick="editKegiatan(${originalIdx})">
                <td>${d.no}<table>
                <td>${d.kegiatan}</td>
                <td>${d.jadwal||''}</td>
                <td>${d.startDate||''}</td>
                <td>${d.endDate||''}</td>
                <td class="status-icon">${d.status}</td>
                <td>${d.pic||''}</td>
                <td>${d.kendala||''}</td>
                <td>${d.tindakLanjut||''}</td>
                <td>${d.keterangan||''}</td>
                <td>${d.overdue?'<span class="overdue-badge">Terlambat</span>':'-'}</td>
                <td><button class="danger" onclick="event.stopPropagation(); deleteKegiatan(${originalIdx})" style="padding:4px 12px;">🗑️</button></td>
            </tr>`;
        });
        
        // GANTT CHART
        const valid = enriched.filter(d => d.startDate && d.endDate);
        if (valid.length) {
            let minDate = new Date(valid[0].startDate);
            let maxDate = new Date(valid[0].endDate);
            valid.forEach(d => {
                let s = new Date(d.startDate);
                let e = new Date(d.endDate);
                if (s < minDate) minDate = s;
                if (e > maxDate) maxDate = e;
            });
            
            const startRange = new Date(minDate);
            startRange.setDate(startRange.getDate() - 1);
            const endRange = new Date(maxDate);
            endRange.setDate(endRange.getDate() + 1);
            const totalDays = (endRange - startRange) / (1000 * 3600 * 24);
            
            const months = generateMonthHeaders(startRange, endRange, totalDays);
            
            let html = `<div style="font-size:0.7rem; margin-bottom:10px;">Timeline: ${startRange.toLocaleDateString()} → ${endRange.toLocaleDateString()}</div>`;
            
            // Header bulan
            html += `<div style="display:flex; margin-bottom:8px; align-items:center;">`;
            html += `<div style="width:220px; font-weight:bold; color:#2d3748;">Kegiatan</div>`;
            html += `<div style="flex:1; position:relative; height:24px;">`;
            for (let month of months) {
                if (month.width > 0) {
                    html += `<div style="position:absolute; left:${month.left}%; width:${month.width}%; text-align:center; font-weight:bold; color:#2c5282; font-size:0.7rem;">${month.name}</div>`;
                }
            }
            html += `</div></div>`;
            
            // Baris Gantt
            valid.slice(0, 40).forEach(d => {
                let start = new Date(d.startDate);
                let end = new Date(d.endDate);
                let left = Math.max(0, ((start - startRange) / (1000 * 3600 * 24) / totalDays) * 100);
                let width = Math.min(100 - left, ((end - start) / (1000 * 3600 * 24) / totalDays) * 100);
                if (width < 0.5 && width > 0) width = 0.8;
                let barColor = d.overdue ? "#f6ad55" : "#4299e1";
                const startShort = formatDDMM(d.startDate);
                const endShort = formatDDMM(d.endDate);
                const dateLabel = `${startShort}→${endShort}`;
                
                html += `<div class="gantt-row" style="margin-bottom:6px;">
                    <div class="gantt-label" title="${d.kegiatan.replace(/"/g, '&quot;')}">${d.no}. ${d.kegiatan.substring(0, 35)}</div>
                    <div class="gantt-bar-container">
                        <div style="background:${barColor}; height:28px; border-radius:12px; margin-left:${left}%; width:${width}%; display:flex; align-items:center; padding-left:8px; color:white; font-size:0.7rem; font-weight:bold;">
                            ${width > 8 ? dateLabel : ''}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("ganttContainer").innerHTML = html;
        } else {
            document.getElementById("ganttContainer").innerHTML = "<p>Tidak ada data tanggal untuk Gantt Chart</p>";
        }
    }
    
    // ============================================================
    // INISIALISASI
    // ============================================================
    loadData();
    clearForm();
</script>
